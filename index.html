<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qulay Market - Smart POS Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #0088cc;
            --success: #2ecc71;
            --warning: #f1c40f;
            --dark: #2c3e50;
            --bg: #f5f6fa;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0; padding: 12px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            width: 100%; max-width: 450px;
            background: white; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 16px; box-sizing: border-box;
        }
        /* Mode Selector toggles */
        .mode-selector {
            display: flex; gap: 8px; margin-bottom: 15px;
        }
        .mode-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 14px;
            background: #e1e8ed; color: var(--dark); transition: all 0.2s;
        }
        .mode-btn.active {
            background: var(--primary); color: white;
        }
        #reader {
            width: 100%; border-radius: 12px; overflow: hidden;
            border: 2px solid #ccc !important; background: black;
        }
        .form-group {
            display: none; text-align: left; margin-top: 15px;
        }
        .form-group.active { display: block; }
        label {
            font-size: 13px; font-weight: bold; color: #7f8c8d;
            display: block; margin-bottom: 4px; margin-top: 8px;
        }
        input, select {
            width: 100%; padding: 10px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        .action-btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            background: var(--success); color: white; font-weight: bold;
            font-size: 16px; margin-top: 15px; cursor: pointer;
        }
        .cart-list {
            text-align: left; background: #f8f9fa; padding: 10px;
            border-radius: 8px; margin-top: 10px; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="mode-selector">
        <button class="mode-btn active" id="btn-kirim" onclick="setMode('kirim')">➕ Ombor (Kirim)</button>
        <button class="mode-btn" id="btn-chiqim" onclick="setMode('chiqim')">🛒 Kassa (Sotuv)</button>
    </div>

    <div id="reader"></div>

    <div id="form-kirim" class="form-group active">
        <label>Shtrix-kod</label>
        <input type="text" id="k-barcode" placeholder="Kamera orqali o'qing..." readonly style="background:#eee;">
        
        <label>Mahsulot nomi</label>
        <input type="text" id="k-name" placeholder="Masalan: Coca Cola 1.5L">
        
        <label>Kategoriya</label>
        <select id="k-category">
            <option value="ichimlik">Ichimliklar</option>
            <option value="shirinlik">Shirinliklar / Pecenye</option>
            <option value="sut">Sut mahsulotlari</option>
            <option value="snack">Chips / Snacklar</option>
        </select>
        
        <label>Sotuv Narxi (so'm)</label>
        <input type="number" id="k-price" placeholder="12000">
        
        <label>Mavjud miqdori (Soni)</label>
        <input type="number" id="k-qty" placeholder="50">
        
        <label>Amal qilish muddati</label>
        <input type="date" id="k-expire">
        
        <label>Yashirin kalit so'zlar (Keywords - mijozga ko'rinmaydi, qidiruv uchun)</label>
        <input type="text" id="k-keywords" placeholder="cola, ko'la, gazli, pepsicor">
        
        <label>Rasm manzili (Rasm Linki)</label>
        <input type="text" id="k-image" value="https://images.unsplash.com/photo-1541658016709-82535e94bc69?w=500">

        <button class="action-btn" onclick="submitKirim()">📦 Omborgaga Yuklash</button>
    </div>

    <div id="form-chiqim" class="form-group">
        <label>Oxirgi skan qilingan kod:</label>
        <div id="c-status" style="font-weight:bold; color:var(--primary); margin-bottom:10px;">Kutilmoqda...</div>
        
        <div class="cart-list">
            <div style="font-weight:bold; border-bottom:1px solid #ddd; padding-bottom:5px;">Savatdagi mahsulotlar ro'yxati:</div>
            <div id="cart-items" style="margin-top:5px; max-height:150px; overflow-y:auto;">
                <i>Hali tovar skan qilinmadi</i>
            </div>
        </div>
        <button class="action-btn" style="background:var(--dark);" onclick="submitChiqim()">🧾 Chek Chiqarish va Sotish</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let currentMode = 'kirim';
    let kassaCart = []; // Kassa rejimida skan qilingan kodlar ro'yxati

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.form-group').forEach(f => f.classList.remove('active'));
        
        document.getElementById(`btn-${mode}`).classList.add('active');
        document.getElementById(`form-${mode}`).classList.add('active');
    }

    function playBeep() {
        try {
            let audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
            audio.play();
            if (navigator.vibrate) navigator.vibrate(100);
        } catch (e) {}
    }

    // Skaner ishlaganda
    function onScanSuccess(decodedText) {
        playBeep();
        if (currentMode === 'kirim') {
            document.getElementById('k-barcode').value = decodedText;
        } else {
            // Kassa rejimi: Kodni savatga qo'shamiz
            kassaCart.push(decodedText);
            document.getElementById('c-status').innerText = "Muvaffaqiyatli o'qildi: " + decodedText;
            updateCartUI();
        }
    }

    function updateCartUI() {
        const box = document.getElementById('cart-items');
        if (kassaCart.length === 0) {
            box.innerHTML = '<i>Hali tovar skan qilinmadi</i>';
            return;
        }
        box.innerHTML = '';
        kassaCart.forEach((code, index) => {
            box.innerHTML += `<div>📍 ${index+1}. Kod: ${code}</div>`;
        });
    }

    // Omborgaga yuklash ma'lumotlarini botga jo'natish
    function submitKirim() {
        const data = {
            action: 'kirim',
            barcode: document.getElementById('k-barcode').value,
            name: document.getElementById('k-name').value,
            category: document.getElementById('k-category').value,
            price: parseFloat(document.getElementById('k-price').value) || 0,
            quantity: parseInt(document.getElementById('k-qty').value) || 0,
            expire_date: document.getElementById('k-expire').value,
            keywords: document.getElementById('k-keywords').value.toLowerCase().split(',').map(s=>s.trim()),
            image: document.getElementById('k-image').value
        };

        if(!data.barcode || !data.name) {
            alert("Shtrix-kod va nomni kiritish majburiy!");
            return;
        }
        tg.sendData(JSON.stringify(data));
    }

    // Kassani yopish va chek chiqarish uchun jo'natish
    function submitChiqim() {
        if(kassaCart.length === 0) {
            alert("Savat bo'sh! Kamida bitta tovar skan qiling.");
            return;
        }
        const data = {
            action: 'chiqim',
            barcodes: kassaCart
        };
        tg.sendData(JSON.stringify(data));
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: { width: 260, height: 140 } }, false);
    html5QrcodeScanner.render(onScanSuccess, () => {});
</script>
</body>
</html>
